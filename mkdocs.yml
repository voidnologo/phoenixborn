site_name: Phoenixborn
site_description: A game-night companion for Ashes Reborn — seven constructed decks from one collection, plus how to build, strategize, and play.
site_url: https://voidnologo.com/phoenixborn/
repo_url: https://github.com/voidnologo/phoenixborn
repo_name: voidnologo/phoenixborn
copyright: Fan-made resource. Ashes and all card art © Plaid Hat Games; card images served from ashes.live.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - content.tooltips
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Game Night: game-night.md
  - Deck Library: decks.md
  - Deckbuilding Guide: deckbuilding.md
  - How to Play: play.md
  - Sharing the Collection: matrix.md
  - Completing the Collection: collection.md
  - References: references.md
